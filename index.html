    <script>

                    <p class="text-lg text-slate-600 leading-relaxed max-w-2xl mb-8">Witamy w Szkole Specjalnej Podstawowej nr 220769 im. Amplitudy Matematyku. Jesteśmy uznawani za najgorszą szkołę w Warszawie, a nasze podejście do edukacji od lat opiera się na całkowitym braku zaangażowania w proces nauczania. Jeśli szukasz palcówki, w której rozwój i wsparcie uczniów są świadomie pomijane, lepiej nie mogłeś/aś trafić.</p>
                    <div class="bg-blue-900 text-white p-8 rounded-2xl shadow-xl">

                                <tr><td class="p-4 font-semibold text-blue-900">Mgr Borys Para</td><td class="p-4 text-sm text-slate-600">DYREKTOR, Język Hiszpański, Geografia, Chemia, Przyroda, Edukacja Zdrowotna, Język Angielski</td></tr>

            'palarnia': `

                        <p><b>Zarządca Palarni:</b> p. Matylda Zdupska (<a href="mailto:matylda.zdupska@sps220769.edu.pl" class="text-blue-600 underline">matylda.zdupska@sps220769.edu.pl</a>)</p>
                        <p class="text-sm text-slate-500 italic mt-4">przelewy BLIK u Dyrektora</p>
                    </div>

            `,
            'stolowka': `

                    <h2 class="text-4xl font-bold mb-6 text-blue-900">Stołówka szkolna</h2>
                    <div class="bg-red-50 p-6 rounded-2xl">
                        <p class="text-2xl text-red-800 font-bold mb-4">Nasze obiady to jedne wielkie gówno!</p> 
                        <p class="text-lg text-slate-800 font-light">Cena za I danie (zupa): 0,1 grosz <br/> Cena za II danie (obiad): 1 złotych.</p>
                    </div>
                </div>
            `,
            'hymn': `
                <div class="page-transition glass-card p-8 rounded-3xl">
                    <h2 class="text-4xl font-bold mb-6 text-blue-900">Hymn szkoły</h2>
                    <div class="bg-indigo-900 text-indigo-100 p-8 rounded-2xl italic text-lg leading-relaxed whitespace-pre-line shadow-inner">
                        Nie złamie Oleny żadna klęska, nie strwoży Dymko żaden trud, pójdziemy razem do Oleny, gdy obejrzy cały serial.  Refren: Olenowskie dzieci, pójdziemy w bój, za każdą szóstkę twą, Oleno, damy krew! Olenowskie dzieci, pójdziemy w bój, gdy padnie rozkaz Twój, poniesiem Dymko gniew!  Odessa, Wola i Kijów, ulica każda, każdy dom – gdy padnie pierwszy strzał, Olena siada, swą wielką dupą na siedzeniu.  Refren: Olenowskie dzieci, pójdziemy w bój, za każdą szóstkę twą, Oleno, damy krew! Olenowskie dzieci, pójdziemy w bój, gdy Anetka nie da hajsu, Olena wkurzy się!  Od Oleny, Dupy, Kupy, Cycka, Olenę każdy lubić ma! Wierzymy, że Olena jest wierna!  Nasza patronka daje Nam chron!  Refren: Olenowskie dzieci, pójdziemy w bój, za każdą szóstkę twą, Oleno, damy krew! Olenowskie dzieci, pójdziemy w bój, gdy padnie rozkaz Twój, poniesiem Dymko gniew!
                    </div>
                    <div class="mt-8">
                        <p class="font-bold mb-2">Melodia naszego hymnu:</p>                                             
                        <audio controls class="w-full">
                          <source src="files/Melodia - Olenowskie Dzieci.mp3" type="audio/mpeg">
                        </audio>
                    </div>
                </div>
            `,
            'kontakt': `
                <div class="page-transition glass-card p-8 rounded-3xl">
                    <h2 class="text-4xl font-bold mb-6 text-blue-900">Kontakt</h2>
                    <div class="space-y-4">
                        <p class="text-lg"><strong>Adres:</strong> ul. Aleja Maliarenko 69/7, 22-069 Warszawa</p>
                        <p class="text-lg"><strong>Telefon:</strong> +48 22 069 69 69</p>
                        <p class="text-lg"><strong>Email:</strong> sekretariat@sps220769.edu.pl</p>
                    </div>
                </div>
            `
        };

        function navigate() {
            const hash = window.location.hash.substring(1) || 'home';
            const content = pages[hash] || pages['home'];
            document.getElementById('app').innerHTML = content;
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === '#' + hash) {
                    link.classList.add('active');
                }
            });
            // Hide mobile menu on navigation
            document.getElementById('nav-menu').classList.add('hidden');
        }

        document.getElementById('menu-btn').addEventListener('click', () => {
            const menu = document.getElementById('nav-menu');
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
            menu.classList.toggle('flex-col');
            menu.classList.toggle('absolute');
            menu.classList.toggle('top-16');
            menu.classList.toggle('left-0');
            menu.classList.toggle('w-full');
            menu.classList.toggle('bg-white');
            menu.classList.toggle('p-4');
        });

        window.addEventListener('hashchange', navigate);
        window.addEventListener('load', navigate);
    </script>
