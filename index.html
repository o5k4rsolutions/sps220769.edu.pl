<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPS nr 220769 - Warszawa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .statuette-img {
            filter: grayscale(40%) sepia(20%) brightness(110%);
            border-radius: 50% 50% 20% 20% / 60% 60% 20% 20%;
            border: 4px solid #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            transition: transform 0.5s ease;
        }
        
        .page-transition { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-link { transition: all 0.2s; }
        .nav-link:hover { color: #1e3a8a; }
        .nav-link.active { border-bottom: 2px solid #1e3a8a; color: #1e3a8a; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="bg-white sticky top-0 z-50 shadow-sm border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center">
            <a href="#home" class="text-xl font-bold text-blue-900 tracking-tight">SPS 220769</a>
            <div class="flex space-x-1 sm:space-x-4 text-sm font-medium text-slate-600">
                <a href="#home" class="nav-link p-2">Start</a>
                <a href="#o-nas" class="nav-link p-2">O nas</a>
                <a href="#dla-uczniow" class="nav-link p-2">Uczniowie/Rodzice</a>
                <a href="#stolowka" class="nav-link p-2">Stołówka</a>
                <a href="#hymn" class="nav-link p-2">Hymn</a>
                <a href="#kontakt" class="nav-link p-2">Kontakt</a>
            </div>
        </div>
    </nav>

    <header class="bg-white border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-4 py-12 flex flex-col md:flex-row items-center gap-8">
            <img src="files/Gemini_Generated_Image_rsqqwzrsqqwzrsqq.jpg" alt="Patronka" class="statuette-img w-32 h-32 md:w-48 md:h-48 object-cover">
            <div>
                <h1 class="text-3xl md:text-5xl font-bold text-blue-900">Szkoła Podstawowa Specjalna nr 220769</h1>
                <p class="text-blue-700 mt-2 text-lg italic">im. Amplitudy Matematyku w Warszawie</p>
            </div>
        </div>
    </header>

    <main id="app" class="max-w-6xl mx-auto px-4 py-12 min-h-[500px]">
        <!-- Content will be injected here -->
    </main>

    <footer class="bg-slate-900 text-slate-400 py-12 mt-12">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p>&copy; 2026 SPS nr 220769 Warszawa. Wszystkie prawa zastrzeżone.</p>
        </div>
    </footer>

    <script>
        const pages = {
            'home': `
                <div class="page-transition">
                    <h2 class="text-4xl font-bold mb-6">Witaj w naszej szkole</h2>
                    <p class="text-lg text-slate-600 max-w-2xl mb-8">Jesteśmy placówką dedykowaną uczniom ze specjalnymi potrzebami edukacyjnymi. Nasza praca opiera się na empatii i indywidualnym podejściu.</p>
                    <div class="bg-blue-900 text-white p-8 rounded-2xl shadow-lg inline-block">
                        <h3 class="text-2xl font-bold mb-2">Rekrutacja 2026</h3>
                        <p>Zapraszamy do kontaktu w sprawie zapisów.</p>
                    </div>
                </div>
            `,
            'o-nas': `
                <div class="page-transition">
                    <h2 class="text-4xl font-bold mb-6 text-blue-900">O nas</h2>
                    <div class="bg-white p-8 rounded-2xl border border-slate-200">
                        <p class="text-lg text-slate-700 mb-6">Szkoła Podstawowa Specjalna nr 220769 to miejsce, gdzie każdy uczeń otrzymuje wsparcie, na które zasługuje.</p>
                        <ul class="list-disc ml-6 space-y-3">
                            <li>Wykwalifikowana kadra pedagogiczna</li>
                            <li>Indywidualne programy edukacyjne (IPET)</li>
                            <li>Nowoczesna baza dydaktyczna</li>
                        </ul>
                    </div>
                </div>
            `,
            'dla-uczniow': `
                <div class="page-transition">
                    <h2 class="text-4xl font-bold mb-6 text-blue-900">Dla uczniów i rodziców</h2>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="p-6 bg-white border border-slate-200 rounded-xl">
                            <h3 class="font-bold text-xl mb-3">Procedury</h3>
                            <p>Dokumenty rekrutacyjne, zasady funkcjonowania szkoły.</p>
                        </div>
                        <div class="p-6 bg-white border border-slate-200 rounded-xl">
                            <h3 class="font-bold text-xl mb-3">Wsparcie</h3>
                            <p>Pomoc psychologiczno-pedagogiczna dla rodzin.</p>
                        </div>
                    </div>
                </div>
            `,
            'stolowka': `
                <div class="page-transition">
                    <h2 class="text-4xl font-bold mb-6 text-blue-900">Stołówka szkolna</h2>
                    <div class="bg-emerald-50 border border-emerald-100 p-8 rounded-2xl">
                        <p class="text-lg text-emerald-800 italic">"Zdrowe jedzenie to fundament nauki."</p>
                        <p class="mt-4">Zapewniamy posiłki zbilansowane, z uwzględnieniem diet specjalistycznych.</p>
                    </div>
                </div>
            `,
            'hymn': `
                <div class="page-transition">
                    <h2 class="text-4xl font-bold mb-6 text-blue-900">Hymn szkoły</h2>
                    <div class="bg-indigo-50 border-l-4 border-indigo-600 p-8 rounded-r-2xl italic text-lg text-slate-800">
                        <p>"Wśród liczb i prawd, gdzie wiedza nam płonie,<br>
                        SPS 220769 w nas ma swe dłonie.<br>
                        Amplituda wiedzy, serca bicie młode,<br>
                        Razem pokonamy każdą złą pogodę!"</p>
                    </div>
                </div>
            `,
            'kontakt': `
                <div class="page-transition">
                    <h2 class="text-4xl font-bold mb-6 text-blue-900">Kontakt</h2>
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <p class="text-lg"><strong>Adres:</strong> ul. Aleja Maliarenko 69/7, 22-069 Warszawa</p>
                        <p class="text-lg"><strong>Telefon:</strong> +48 22 069 69 69</p>
                        <p class="text-lg"><strong>Email:</strong> sekretariat@sps220769.edu.pl</p>
                    </div>
                </div>
            `
        };

        function navigate() {
            const hash = window.location.hash.substring(1) || 'home';
            const content = pages[hash] || pages['home'];
            document.getElementById('app').innerHTML = content;
            
            // Update active link
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === '#' + hash) {
                    link.classList.add('active');
                }
            });
        }

        window.addEventListener('hashchange', navigate);
        window.addEventListener('load', navigate);
    </script>
</body>
</html>
