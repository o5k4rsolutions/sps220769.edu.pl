<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - SPS 220769</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1); }
        .page-transition { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <main id="app" class="max-w-xl w-full">
    </main>

    <script>
        const pages = {
            '404': `
                <div class="page-transition glass-card p-12 rounded-3xl text-center">
                    <div class="text-9xl font-bold text-blue-900 mb-4 opacity-50">404</div>
                    <h2 class="text-3xl font-bold text-slate-800 mb-6">Błąd w podstawie programowej</h2>
                    <p class="text-slate-600 mb-8 leading-relaxed italic">
                        Szukana strona nie istnieje. Podobnie jak wiedza w głowach naszych uczniów – 
                        ten brak jest w pełni zamierzony i wpisuje się w naszą unikalną strategię 
                        "zero nauki". Nie szukaj tu sensu, my też go nie znaleźliśmy.
                    </p>
                    <a href="index.html#home" class="inline-block bg-blue-900 text-white px-8 py-4 rounded-full font-bold hover:bg-blue-800 transition transform hover:scale-105">
                        Wróć do miejsca, gdzie niczego się nie nauczysz
                    </a>
                </div>
            `
        };

        // Renderowanie zawartości
        function load404() {
            document.getElementById('app').innerHTML = pages['404'];
        }

        window.addEventListener('load', load404);
    </script>
</body>
</html>
